version: "3"

services:
  lavalink:
    image: lavalink:latest
    container_name: lavalink
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8080/version"]
    #   interval: 30s
    #   timeout: 5s
    #   retries: 3
    #   start_period: 20s

  bot:
    build: .
    container_name: HarmoniQ
    depends_on:
      lavalink:
        condition: service_started
    environment:
      - LAVALINK_HOST=lavalink
      - LAVALINK_PORT=${LAVALINK_PORT}
      - LAVALINK_PASSWORD=${LAVALINK_TOKEN}
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - YT_API_KEY=${YT_API_KEY}
    
    command: sh -c "sleep 10 && node ./dist/index.js"
